<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>müzikHan · DEMO AĞI</title>
<link rel="icon" type="image/png" href="simge.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030303; --card:#0a0a0a; --line:rgba(255,255,255,.07);
  --line-strong:rgba(255,255,255,.16);
  --txt:#ededed; --mut:#7a7a7a; --dim:#444;
  --accent:#ffffff; --gold:#e3b341; --bad:#ff5d5d; --good:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#444;}

/* ambient grain glow */
#bg-glow{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(700px 500px at 50% -5%,rgba(255,255,255,.06),transparent 70%);}

.mono{font-family:'Space Mono',monospace;}
.disp{font-family:'Syncopate',sans-serif;}
.eyebrow{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:4px;color:var(--dim);text-transform:uppercase;}

button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
a{color:inherit;}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 18px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.02);
  color:var(--txt);font-size:.8rem;font-weight:600;letter-spacing:.3px;transition:.25s;width:100%;}
.btn:hover{border-color:var(--line-strong);background:rgba(255,255,255,.05);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.btn-primary:hover{box-shadow:0 0 24px rgba(255,255,255,.25);background:#fff;}
.btn-ghost{background:transparent;}
.btn-danger{border-color:rgba(255,93,93,.3);color:#ff8a8a;}
.btn-danger:hover{background:rgba(255,93,93,.08);border-color:var(--bad);}
.btn-sm{padding:9px 12px;font-size:.7rem;border-radius:9px;width:auto;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ---------- AUTH ---------- */
#view-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-box{width:100%;max-width:380px;}
.auth-logo{text-align:center;margin-bottom:34px;}
.auth-logo .disp{font-size:2rem;letter-spacing:5px;text-shadow:0 0 30px rgba(255,255,255,.25);}
.auth-logo .sub{margin-top:10px;font-size:.6rem;letter-spacing:6px;color:var(--mut);}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:26px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.62rem;letter-spacing:2px;color:var(--mut);margin-bottom:7px;text-transform:uppercase;font-family:'Space Mono',monospace;}
.input{width:100%;padding:13px 14px;background:#060606;border:1px solid var(--line);border-radius:11px;
  color:var(--txt);font-size:.85rem;transition:.2s;}
.input:focus{outline:none;border-color:var(--line-strong);box-shadow:0 0 0 3px rgba(255,255,255,.04);}
.input::placeholder{color:#3a3a3a;}
textarea.input{resize:vertical;min-height:90px;line-height:1.6;}
.auth-switch{text-align:center;margin-top:18px;font-size:.75rem;color:var(--mut);}
.auth-switch b{color:var(--accent);cursor:pointer;border-bottom:1px solid transparent;}
.auth-switch b:hover{border-color:var(--accent);}
.msg{font-size:.72rem;margin-top:12px;min-height:16px;line-height:1.5;font-family:'Space Mono',monospace;}
.msg.err{color:var(--bad);}
.msg.ok{color:var(--good);}

/* ---------- APP SHELL ---------- */
#view-app{display:none;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
  background:rgba(3,3,3,.72);border-bottom:1px solid var(--line);}
.topbar-inner{max-width:760px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:14px;}
.brand{font-family:'Syncopate',sans-serif;font-size:.95rem;letter-spacing:2px;}
.brand small{display:block;font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:3px;color:var(--dim);font-weight:400;margin-top:3px;}
.nav{display:flex;gap:6px;margin-left:auto;}
.nav button{padding:9px 13px;border-radius:9px;border:1px solid transparent;background:transparent;
  color:var(--mut);font-size:.72rem;font-weight:600;letter-spacing:.5px;font-family:'Space Mono',monospace;transition:.2s;}
.nav button:hover{color:var(--txt);}
.nav button.active{color:var(--txt);border-color:var(--line);background:rgba(255,255,255,.04);}
.nav .me-av{width:30px;height:30px;border-radius:50%;border:1px solid var(--line-strong);overflow:hidden;flex-shrink:0;}
.nav .me-av img{width:100%;height:100%;object-fit:cover;}

.wrap{max-width:760px;margin:0 auto;padding:26px 18px 90px;}
.tab{display:none;}
.tab.active{display:block;animation:fade .4s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 0 18px;gap:12px;}
.section-head h2{font-family:'Syncopate',sans-serif;font-size:1.05rem;letter-spacing:1px;}
.section-head .eyebrow{margin-bottom:6px;}

/* ---------- PROFILE ---------- */
.profile-top{display:flex;gap:18px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:20px;margin-bottom:18px;}
.avatar{position:relative;width:96px;height:96px;flex-shrink:0;border-radius:50%;overflow:hidden;
  border:2px solid var(--line-strong);cursor:pointer;background:#111;}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.avatar .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Syncopate',sans-serif;font-size:1.6rem;color:#555;}
.avatar .edit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);opacity:0;transition:.25s;font-size:.55rem;letter-spacing:1px;font-family:'Space Mono',monospace;color:#fff;}
.avatar:hover .edit{opacity:1;}
.profile-meta{flex:1;min-width:0;}
.profile-meta .name{font-family:'Syncopate',sans-serif;font-size:1.15rem;letter-spacing:.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.profile-meta .email{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--mut);margin-top:6px;word-break:break-all;}
.badge{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:1px;padding:3px 8px;border-radius:20px;
  border:1px solid;text-transform:uppercase;}
.badge.admin{color:var(--gold);border-color:rgba(227,179,65,.4);}
.badge.me{color:var(--mut);border-color:var(--line);}

.bio-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:18px;}
.bio-card .lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.bio-text{font-size:.82rem;line-height:1.7;color:#bdbdbd;white-space:pre-wrap;word-break:break-word;}
.bio-text.empty{color:var(--dim);font-style:italic;}

.add-demo-bar{display:flex;gap:10px;margin-bottom:22px;}

/* ---------- DEMO CARD ---------- */
.demo{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:16px;transition:.3s;}
.demo:hover{border-color:var(--line-strong);}
.demo-head{display:flex;gap:12px;padding:16px 16px 12px;align-items:flex-start;}
.demo-av{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--line);background:#111;cursor:pointer;}
.demo-av img{width:100%;height:100%;object-fit:cover;}
.demo-av .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Syncopate',sans-serif;font-size:.8rem;color:#555;}
.demo-id{flex:1;min-width:0;}
.demo-title{font-family:'Space Mono',monospace;font-weight:700;font-size:.95rem;letter-spacing:.4px;word-break:break-word;}
.demo-by{font-size:.68rem;color:var(--mut);margin-top:3px;}
.demo-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.tag{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.5px;padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--mut);}
.demo audio{width:100%;margin:4px 16px 14px;width:calc(100% - 32px);filter:grayscale(1) invert(.92);}

/* console / ratings */
.console{padding:0 16px 14px;}
.console-row{display:grid;grid-template-columns:54px 1fr 34px;gap:10px;align-items:center;margin-bottom:9px;}
.console-row .k{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:1px;color:var(--mut);}
.fader{height:6px;border-radius:6px;background:#161616;overflow:hidden;position:relative;}
.fader>i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;
  background:linear-gradient(90deg,#666,#fff);transition:width .5s cubic-bezier(.2,.8,.2,1);}
.console-row .v{font-family:'Space Mono',monospace;font-size:.66rem;text-align:right;color:var(--txt);}
.score-pill{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gold);}

.demo-actions{display:flex;gap:8px;padding:0 16px 16px;flex-wrap:wrap;}
.linklike{background:none;border:none;color:var(--mut);font-size:.7rem;font-family:'Space Mono',monospace;
  letter-spacing:.5px;padding:6px 2px;}
.linklike:hover{color:var(--txt);}
.linklike.del:hover{color:var(--bad);}

/* rate + comments drawer */
.drawer{border-top:1px solid var(--line);padding:16px;display:none;background:rgba(255,255,255,.012);}
.drawer.open{display:block;}
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.rate-cell .k{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--mut);display:flex;justify-content:space-between;margin-bottom:6px;}
.rate-cell .k b{color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:6px;background:#1c1c1c;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 8px rgba(255,255,255,.4);}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:#fff;cursor:pointer;}

.comments{margin-top:6px;}
.comment{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
.comment .c-av{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#111;border:1px solid var(--line);}
.comment .c-av img{width:100%;height:100%;object-fit:cover;}
.comment .c-av .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#555;font-family:'Syncopate',sans-serif;}
.comment .c-body{flex:1;min-width:0;}
.comment .c-name{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--txt);}
.comment .c-name span{color:var(--dim);font-size:.58rem;margin-left:6px;}
.comment .c-text{font-size:.78rem;color:#c5c5c5;line-height:1.6;margin-top:3px;word-break:break-word;}
.comment-form{display:flex;gap:8px;margin-top:12px;}
.comment-form .input{flex:1;}

/* ---------- ADMIN ---------- */
.admin-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:12px 14px;margin-bottom:10px;}
.admin-row .grow{flex:1;min-width:0;}
.admin-row .t{font-family:'Space Mono',monospace;font-size:.8rem;word-break:break-word;}
.admin-row .s{font-size:.64rem;color:var(--mut);margin-top:3px;word-break:break-all;}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line-strong);border-radius:20px;padding:24px;
  max-height:90vh;overflow:auto;}
.modal h3{font-family:'Syncopate',sans-serif;font-size:.95rem;letter-spacing:1px;margin-bottom:18px;}
.filedrop{border:1px dashed var(--line-strong);border-radius:13px;padding:22px;text-align:center;cursor:pointer;transition:.2s;}
.filedrop:hover{border-color:#fff;background:rgba(255,255,255,.02);}
.filedrop .ic{font-size:1.6rem;}
.filedrop .t{font-family:'Space Mono',monospace;font-size:.72rem;margin-top:8px;color:var(--mut);}
.filedrop.has{border-style:solid;border-color:var(--good);}
.filedrop.has .t{color:var(--good);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.progress{height:4px;border-radius:6px;background:#161616;overflow:hidden;margin-top:14px;display:none;}
.progress.show{display:block;}
.progress>i{display:block;height:100%;width:0;background:#fff;transition:width .2s;}

/* ---------- MISC ---------- */
.empty-state{text-align:center;padding:50px 20px;color:var(--dim);}
.empty-state .ic{font-size:2rem;opacity:.4;}
.empty-state .t{font-family:'Space Mono',monospace;font-size:.78rem;margin-top:12px;letter-spacing:1px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-load{text-align:center;padding:60px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);
  background:#fff;color:#000;font-family:'Space Mono',monospace;font-size:.74rem;font-weight:700;
  padding:12px 20px;border-radius:12px;z-index:500;transition:.4s cubic-bezier(.2,.8,.2,1);box-shadow:0 8px 40px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}

@media(max-width:560px){
  .brand small{display:none;}
  .nav button{padding:8px 10px;font-size:.66rem;}
  .rate-grid{grid-template-columns:1fr;}
  .profile-top{flex-direction:column;text-align:center;}
  .profile-meta .email{text-align:center;}
}
</style>
</head>
<body>
<div id="bg-glow"></div>

<!-- ============ AUTH ============ -->
<div id="view-auth">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="disp">müzikHan</div>
      <div class="sub mono">DEMO AĞI · CESO UNIVERSE</div>
    </div>
    <div class="auth-card">
      <div id="reg-name-field" class="field hidden">
        <label>Sahne / Kullanıcı Adı</label>
        <input id="f-name" class="input" placeholder="örn. CESO" autocomplete="nickname">
      </div>
      <div class="field">
        <label>E-posta</label>
        <input id="f-email" type="email" class="input" placeholder="seninadin@mail.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Şifre</label>
        <input id="f-pass" type="password" class="input" placeholder="En az 6 karakter" autocomplete="current-password">
      </div>
      <button id="auth-submit" class="btn btn-primary">Giriş Yap</button>
      <div id="auth-msg" class="msg"></div>
      <div class="auth-switch">
        <span id="switch-text">Hesabın yok mu?</span> <b id="switch-btn">Kayıt ol</b>
      </div>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="view-app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">müzikHan<small>DEMO AĞI</small></div>
      <div class="nav">
        <button data-tab="feed" class="active">AKIŞ</button>
        <button data-tab="profile">PROFİL</button>
        <button data-tab="admin" id="nav-admin" class="hidden">ADMIN</button>
        <button id="btn-logout" title="Çıkış yap">ÇIKIŞ</button>
        <div class="me-av" id="me-av"></div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- FEED -->
    <div class="tab active" id="tab-feed">
      <div class="section-head">
        <div>
          <div class="eyebrow">Topluluk</div>
          <h2>Demo Akışı</h2>
        </div>
        <button class="btn btn-sm btn-primary" id="feed-add" style="width:auto;">+ Demo Ekle</button>
      </div>
      <div id="feed-list"><div class="center-load"><span class="spinner"></span></div></div>
    </div>

    <!-- PROFILE -->
    <div class="tab" id="tab-profile">
      <div class="section-head">
        <div><div class="eyebrow">Hesabın</div><h2>Profil</h2></div>
      </div>
      <div class="profile-top">
        <div class="avatar" id="my-avatar" title="Profil fotoğrafı yükle">
          <div class="ph" id="my-avatar-ph">?</div>
          <div class="edit">DEĞİŞTİR</div>
        </div>
        <div class="profile-meta">
          <div class="name"><span id="my-name">—</span> <span id="my-badges"></span></div>
          <div class="email mono" id="my-email"></div>
        </div>
      </div>

      <div class="bio-card">
        <div class="lbl">
          <span class="eyebrow">Biyografi</span>
          <button class="linklike" id="bio-edit-btn">DÜZENLE</button>
        </div>
        <div class="bio-text empty" id="bio-display">Henüz biyografi eklenmedi.</div>
        <div id="bio-editor" class="hidden">
          <textarea id="bio-input" class="input" placeholder="Tarzını, ekipmanını, neyle ilgilendiğini yaz..." maxlength="600"></textarea>
          <div class="add-demo-bar" style="margin-top:12px;">
            <button class="btn btn-primary" id="bio-save">Kaydet</button>
            <button class="btn btn-ghost" id="bio-cancel">Vazgeç</button>
          </div>
        </div>
      </div>

      <div class="add-demo-bar">
        <button class="btn btn-primary" id="profile-add">+ Profiline Demo Ekle</button>
      </div>

      <div class="section-head"><div><div class="eyebrow">Senin paylaşımların</div><h2 style="font-size:.9rem;">Demolarım</h2></div></div>
      <div id="my-demos"><div class="center-load"><span class="spinner"></span></div></div>
    </div>

    <!-- ADMIN -->
    <div class="tab" id="tab-admin">
      <div class="section-head"><div><div class="eyebrow">Yönetim</div><h2>Admin Paneli</h2></div></div>
      <div class="eyebrow" style="margin:18px 0 10px;">Kullanıcılar</div>
      <div id="admin-users"></div>
      <div class="eyebrow" style="margin:26px 0 10px;">Tüm Demolar</div>
      <div id="admin-demos"></div>
    </div>
  </div>
</div>

<!-- ============ DEMO UPLOAD MODAL ============ -->
<div class="modal-bg" id="demo-modal">
  <div class="modal">
    <h3>Demo Yükle</h3>
    <div class="field"><label>Parça Adı</label><input id="d-title" class="input" placeholder="örn. GECE VURUŞU" maxlength="80"></div>
    <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label class="mono" style="display:block;font-size:.62rem;letter-spacing:2px;color:var(--mut);margin-bottom:7px;text-transform:uppercase;">Tür</label>
        <select id="d-genre" class="input">
          <option>Trap</option><option>Drill</option><option>Boom Bap</option>
          <option>Rap</option><option>Hip Hop</option><option>R&B</option>
          <option>Pop Rap</option><option>Diss</option><option>Freestyle</option><option>Diğer</option>
        </select>
      </div>
      <div>
        <label class="mono" style="display:block;font-size:.62rem;letter-spacing:2px;color:var(--mut);margin-bottom:7px;text-transform:uppercase;">BPM</label>
        <input id="d-bpm" class="input" type="number" placeholder="140" min="40" max="300">
      </div>
    </div>
    <div class="field">
      <label>Ses Dosyası (MP3/WAV · max 20MB)</label>
      <div class="filedrop" id="d-drop">
        <div class="ic">⬆</div>
        <div class="t" id="d-drop-text">Dosya seçmek için dokun</div>
      </div>
      <input id="d-file" type="file" accept="audio/mpeg,audio/wav,audio/mp3,.mp3,.wav" class="hidden">
    </div>
    <div class="progress" id="d-progress"><i></i></div>
    <div class="msg" id="d-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="d-upload">Yükle ve Paylaş</button>
      <button class="btn btn-ghost" id="d-cancel">İptal</button>
    </div>
  </div>
</div>

<input id="avatar-file" type="file" accept="image/*" class="hidden">
<div class="toast" id="toast"></div>

/* ====== ADMIN AYARI ======
   Hiçbir şey yazmana GEREK YOK. Siteye ilk kayıt olan kişi otomatik ADMIN olur.
   Diğer arkadaşlarını da Admin Panelinden "Admin yap" diyerek yetkilendirirsin.
   (İstersen aşağıya mail ekleyerek de sabit admin tanımlayabilirsin — şart değil.) */
const ADMIN_EMAILS = [
  // "ornek@gmail.com",
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const initial = n => (n||"?").trim().charAt(0).toUpperCase();
function toast(t){const el=$("#toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600);}
function avatarHTML(url,name,cls=""){ return url
  ? `<div class="${cls}"><img src="${esc(url)}" alt=""></div>`
  : `<div class="${cls}"><div class="ph">${esc(initial(name))}</div></div>`; }
function timeAgo(ts){ if(!ts) return ""; const d=ts.toDate?ts.toDate():new Date(ts);
  const s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<60)return "az önce"; if(s<3600)return Math.floor(s/60)+" dk önce";
  if(s<86400)return Math.floor(s/3600)+" sa önce"; return Math.floor(s/86400)+" gün önce"; }

let me = null;        // firebase user
let myProfile = null; // firestore profile doc
let isAdmin = false;

/* rol kararı: admin maili listede mi, ya da sistemdeki İLK kullanıcı mı? */
async function decideRole(email){
  if(ADMIN_EMAILS.includes((email||"").toLowerCase())) return "admin";
  try{
    const first = await getDocs(query(collection(db,"users"), limit(1)));
    if(first.empty) return "admin";   // siteye kayıt olan ilk kişi
  }catch(e){ /* okuma engellenirse normal kullanıcı */ }
  return "user";
}

/* ================= AUTH UI ================= */
let mode = "login";
const elName=$("#reg-name-field"), aMsg=$("#auth-msg");
$("#switch-btn").onclick = ()=>{
  mode = mode==="login" ? "register":"login";
  const reg = mode==="register";
  elName.classList.toggle("hidden",!reg);
  $("#auth-submit").textContent = reg ? "Kayıt Ol":"Giriş Yap";
  $("#switch-text").textContent = reg ? "Zaten hesabın var mı?":"Hesabın yok mu?";
  $("#switch-btn").textContent = reg ? "Giriş yap":"Kayıt ol";
  aMsg.textContent="";
};
$("#auth-submit").onclick = async ()=>{
  const email=$("#f-email").value.trim(), pass=$("#f-pass").value, name=$("#f-name").value.trim();
  aMsg.className="msg"; aMsg.textContent="";
  if(!email||!pass){ aMsg.classList.add("err"); aMsg.textContent="E-posta ve şifre gerekli."; return; }
  $("#auth-submit").disabled=true;
  try{
    if(mode==="register"){
      if(!name){ throw {message:"Bir kullanıcı adı gir."}; }
      const cred = await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      const role = await decideRole(email);
      await setDoc(doc(db,"users",cred.user.uid),{
        displayName:name, email, bio:"", photoURL:"",
        role,
        createdAt: serverTimestamp()
      });
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    aMsg.classList.add("err");
    aMsg.textContent = friendlyErr(e.code||e.message);
  }finally{ $("#auth-submit").disabled=false; }
};
function friendlyErr(c){
  const m={
    "auth/invalid-email":"Geçersiz e-posta adresi.",
    "auth/email-already-in-use":"Bu e-posta zaten kayıtlı. Giriş yapmayı dene.",
    "auth/weak-password":"Şifre en az 6 karakter olmalı.",
    "auth/invalid-credential":"E-posta veya şifre hatalı.",
    "auth/user-not-found":"Böyle bir kullanıcı yok.",
    "auth/wrong-password":"Şifre hatalı.",
    "auth/too-many-requests":"Çok fazla deneme. Biraz sonra tekrar dene."
  };
  return m[c] || ("Hata: "+c);
}

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, async user=>{
  if(user){
    me = user;
    // profil dokümanını getir/oluştur
    const uref = doc(db,"users",user.uid);
    let snap = await getDoc(uref);
    if(!snap.exists()){
      const role = await decideRole(user.email);
      await setDoc(uref,{ displayName:user.displayName||"Kullanıcı", email:user.email,
        bio:"", photoURL:user.photoURL||"", role,
        createdAt: serverTimestamp() });
      snap = await getDoc(uref);
    }
    myProfile = snap.data();
    // admin maili eklenmişse rolü güncelle
    if(ADMIN_EMAILS.includes((user.email||"").toLowerCase()) && myProfile.role!=="admin"){
      await updateDoc(uref,{role:"admin"}); myProfile.role="admin";
    }
    isAdmin = myProfile.role==="admin";
    enterApp();
  }else{
    me=null; myProfile=null; isAdmin=false;
    $("#view-app").style.display="none";
    $("#view-auth").style.display="flex";
  }
});

$("#btn-logout").onclick = ()=> signOut(auth);

function enterApp(){
  $("#view-auth").style.display="none";
  $("#view-app").style.display="block";
  $("#nav-admin").classList.toggle("hidden",!isAdmin);
  renderMe();
  loadFeed();
  switchTab("feed");
}

function renderMe(){
  $("#me-av").innerHTML = myProfile.photoURL
    ? `<img src="${esc(myProfile.photoURL)}">`
    : `<div class="ph" style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Syncopate';font-size:.7rem;color:#666;">${esc(initial(myProfile.displayName))}</div>`;
  // profile tab
  $("#my-name").textContent = myProfile.displayName;
  $("#my-email").textContent = myProfile.email;
  const av=$("#my-avatar"), ph=$("#my-avatar-ph");
  av.querySelector("img")?.remove();
  if(myProfile.photoURL){ ph.style.display="none"; const i=document.createElement("img"); i.src=myProfile.photoURL; av.prepend(i); }
  else { ph.style.display="flex"; ph.textContent=initial(myProfile.displayName); }
  const badges=[];
  if(isAdmin) badges.push(`<span class="badge admin">ADMIN</span>`);
  $("#my-badges").innerHTML = badges.join(" ");
  // bio
  const bd=$("#bio-display");
  if(myProfile.bio){ bd.textContent=myProfile.bio; bd.classList.remove("empty"); }
  else { bd.textContent="Henüz biyografi eklenmedi."; bd.classList.add("empty"); }
}

/* ================= TABS ================= */
function switchTab(t){
  document.querySelectorAll(".nav button[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  $("#tab-"+t).classList.add("active");
  if(t==="profile") loadMyDemos();
  if(t==="admin" && isAdmin) loadAdmin();
}
document.querySelectorAll(".nav button[data-tab]").forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));

/* ================= BIO ================= */
$("#bio-edit-btn").onclick=()=>{ $("#bio-input").value=myProfile.bio||""; $("#bio-display").classList.add("hidden"); $("#bio-editor").classList.remove("hidden"); };
$("#bio-cancel").onclick=()=>{ $("#bio-editor").classList.add("hidden"); $("#bio-display").classList.remove("hidden"); };
$("#bio-save").onclick=async ()=>{
  const v=$("#bio-input").value.trim();
  await updateDoc(doc(db,"users",me.uid),{bio:v});
  myProfile.bio=v; renderMe();
  $("#bio-editor").classList.add("hidden"); $("#bio-display").classList.remove("hidden");
  toast("Biyografi kaydedildi");
};

/* ================= AVATAR UPLOAD ================= */
$("#my-avatar").onclick=()=> $("#avatar-file").click();
$("#avatar-file").onchange=async e=>{
  const file=e.target.files[0]; if(!file) return;
  if(!file.type.startsWith("image/")){ toast("Sadece görsel yükle"); return; }
  if(file.size>5*1024*1024){ toast("Fotoğraf 5MB'tan küçük olmalı"); return; }
  toast("Fotoğraf yükleniyor…");
  try{
    const path=`profile_photos/${me.uid}/avatar_${Date.now()}`;
    const sref=ref(storage,path);
    const task=uploadBytesResumable(sref,file);
    await task;
    const url=await getDownloadURL(sref);
    await updateDoc(doc(db,"users",me.uid),{photoURL:url});
    myProfile.photoURL=url; renderMe();
    toast("Profil fotoğrafı güncellendi");
  }catch(err){ console.error(err); toast("Yükleme hatası: "+(err.code||err.message)); }
  e.target.value="";
};

/* ================= DEMO UPLOAD MODAL ================= */
const modal=$("#demo-modal"); let pickedFile=null;
function openModal(){ pickedFile=null; $("#d-title").value=""; $("#d-bpm").value=""; $("#d-genre").selectedIndex=0;
  $("#d-drop").classList.remove("has"); $("#d-drop-text").textContent="Dosya seçmek için dokun";
  $("#d-msg").textContent=""; $("#d-progress").classList.remove("show"); $("#d-progress>i") && ($("#d-progress").querySelector("i").style.width="0");
  modal.classList.add("open"); }
function closeModal(){ modal.classList.remove("open"); }
$("#feed-add").onclick=openModal; $("#profile-add").onclick=openModal; $("#d-cancel").onclick=closeModal;
modal.onclick=e=>{ if(e.target===modal) closeModal(); };
$("#d-drop").onclick=()=> $("#d-file").click();
$("#d-file").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  if(f.size>20*1024*1024){ $("#d-msg").className="msg err"; $("#d-msg").textContent="Dosya 20MB'tan büyük olamaz."; return; }
  pickedFile=f; $("#d-drop").classList.add("has");
  $("#d-drop-text").textContent=f.name+" · "+(f.size/1024/1024).toFixed(1)+"MB"; $("#d-msg").textContent="";
};
$("#d-upload").onclick=async ()=>{
  const title=$("#d-title").value.trim();
  const msg=$("#d-msg"); msg.className="msg";
  if(!title){ msg.classList.add("err"); msg.textContent="Parça adı gir."; return; }
  if(!pickedFile){ msg.classList.add("err"); msg.textContent="Bir ses dosyası seç."; return; }
  $("#d-upload").disabled=true;
  const prog=$("#d-progress"), bar=prog.querySelector("i"); prog.classList.add("show");
  try{
    const safe=pickedFile.name.replace(/[^\w.\-]/g,"_");
    const path=`demos/${me.uid}/${Date.now()}_${safe}`;
    const sref=ref(storage,path);
    const task=uploadBytesResumable(sref,pickedFile,{contentType:pickedFile.type});
    task.on("state_changed",s=>{ bar.style.width=Math.round(s.bytesTransferred/s.totalBytes*100)+"%"; });
    await task;
    const url=await getDownloadURL(sref);
    await addDoc(collection(db,"demos"),{
      title, genre:$("#d-genre").value, bpm:Number($("#d-bpm").value)||null,
      audioURL:url, storagePath:path,
      ownerId:me.uid, ownerName:myProfile.displayName, ownerPhoto:myProfile.photoURL||"",
      createdAt:serverTimestamp(),
      sumMix:0,sumMaster:0,sumLyrics:0,sumBeat:0,ratingCount:0,commentCount:0
    });
    closeModal(); toast("Demo paylaşıldı 🔥");
  }catch(err){ console.error(err); msg.classList.add("err"); msg.textContent="Yükleme hatası: "+(err.code||err.message); }
  finally{ $("#d-upload").disabled=false; }
};

/* ================= FEED ================= */
let feedUnsub=null;
function loadFeed(){
  if(feedUnsub) return;
  const qy=query(collection(db,"demos"),orderBy("createdAt","desc"));
  feedUnsub=onSnapshot(qy,snap=>{
    const list=$("#feed-list");
    if(snap.empty){ list.innerHTML=emptyState("🎧","Henüz demo yok. İlk paylaşan sen ol."); return; }
    list.innerHTML="";
    snap.forEach(d=> list.appendChild(demoCard(d.id,d.data())));
  },err=>{ $("#feed-list").innerHTML=emptyState("⚠","Akış yüklenemedi: "+err.code); });
}
function emptyState(ic,t){ return `<div class="empty-state"><div class="ic">${ic}</div><div class="t">${esc(t)}</div></div>`; }

async function loadMyDemos(){
  const box=$("#my-demos"); box.innerHTML=`<div class="center-load"><span class="spinner"></span></div>`;
  const qy=query(collection(db,"demos"),where("ownerId","==",me.uid));
  try{
    const snap=await getDocs(qy);
    if(snap.empty){ box.innerHTML=emptyState("🎚","Henüz demo eklemedin."); return; }
    const arr=[]; snap.forEach(d=>arr.push([d.id,d.data()]));
    arr.sort((a,b)=>(b[1].createdAt?.toMillis?.()||0)-(a[1].createdAt?.toMillis?.()||0));
    box.innerHTML="";
    arr.forEach(([id,data])=> box.appendChild(demoCard(id,data)));
  }catch(e){ box.innerHTML=emptyState("⚠","Yüklenemedi: "+e.code); }
}

const RK=[["Mix","mix","sumMix"],["Master","master","sumMaster"],["Söz","lyrics","sumLyrics"],["Beat","beat","sumBeat"]];
function avg(data,sumKey){ return data.ratingCount? (data[sumKey]/data.ratingCount):0; }

function demoCard(id,data){
  const el=document.createElement("div"); el.className="demo"; el.dataset.id=id;
  const overall = data.ratingCount
    ? ((avg(data,"sumMix")+avg(data,"sumMaster")+avg(data,"sumLyrics")+avg(data,"sumBeat"))/4).toFixed(1)
    : null;
  const canDelete = isAdmin || data.ownerId===me.uid;

  const faders = RK.map(([label,_k,sk])=>{
    const v=avg(data,sk); const pct=Math.round(v/10*100);
    return `<div class="console-row"><div class="k">${label}</div>
      <div class="fader"><i style="width:${pct}%"></i></div>
      <div class="v">${data.ratingCount? v.toFixed(1):"–"}</div></div>`;
  }).join("");

  el.innerHTML=`
    <div class="demo-head">
      <div class="demo-av">${ data.ownerPhoto?`<img src="${esc(data.ownerPhoto)}">`:`<div class="ph">${esc(initial(data.ownerName))}</div>`}</div>
      <div class="demo-id">
        <div class="demo-title">${esc(data.title)}</div>
        <div class="demo-by">${esc(data.ownerName)} · ${timeAgo(data.createdAt)}</div>
        <div class="demo-tags">
          <span class="tag">${esc(data.genre||"—")}</span>
          ${data.bpm?`<span class="tag">${data.bpm} BPM</span>`:""}
          ${overall?`<span class="tag" style="color:var(--gold);border-color:rgba(227,179,65,.35);">★ ${overall} · ${data.ratingCount} oy</span>`:`<span class="tag">oy yok</span>`}
        </div>
      </div>
    </div>
    <audio controls preload="none" src="${esc(data.audioURL)}"></audio>
    <div class="console">${faders}</div>
    <div class="demo-actions">
      <button class="linklike act-rate">★ PUANLA</button>
      <button class="linklike act-comments">💬 YORUMLAR (${data.commentCount||0})</button>
      ${canDelete?`<button class="linklike del act-del" style="margin-left:auto;">SİL</button>`:""}
    </div>
    <div class="drawer"></div>`;

  el.querySelector(".act-rate").onclick=()=>toggleRate(el,id,data);
  el.querySelector(".act-comments").onclick=()=>toggleComments(el,id);
  el.querySelector(".act-del") && (el.querySelector(".act-del").onclick=()=>deleteDemo(id,data));
  return el;
}

/* ---- rate drawer ---- */
async function toggleRate(el,id,data){
  const dr=el.querySelector(".drawer");
  if(dr.classList.contains("open") && dr.dataset.kind==="rate"){ dr.classList.remove("open"); return; }
  dr.dataset.kind="rate"; dr.classList.add("open");
  // mevcut puanını getir
  let prev={mix:5,master:5,lyrics:5,beat:5};
  const pSnap=await getDoc(doc(db,"demos",id,"ratings",me.uid));
  if(pSnap.exists()) prev=pSnap.data();
  dr.innerHTML=`
    <div class="eyebrow" style="margin-bottom:12px;">Bu demoyu değerlendir · 1–10</div>
    <div class="rate-grid">
      ${RK.map(([label,k])=>`
        <div class="rate-cell">
          <div class="k">${label} <b data-out="${k}">${prev[k]||5}</b></div>
          <input type="range" min="1" max="10" value="${prev[k]||5}" data-k="${k}">
        </div>`).join("")}
    </div>
    <button class="btn btn-primary r-save">${pSnap.exists()?"Puanı Güncelle":"Puanı Gönder"}</button>`;
  dr.querySelectorAll('input[type=range]').forEach(r=>{
    r.oninput=()=> dr.querySelector(`[data-out="${r.dataset.k}"]`).textContent=r.value;
  });
  dr.querySelector(".r-save").onclick=async ()=>{
    const vals={}; dr.querySelectorAll('input[type=range]').forEach(r=> vals[r.dataset.k]=Number(r.value));
    await submitRating(id,vals,pSnap.exists()?pSnap.data():null);
    dr.classList.remove("open");
    toast("Puanın kaydedildi");
  };
}
async function submitRating(id,vals,old){
  const dref=doc(db,"demos",id);
  const upd={
    sumMix:increment(vals.mix-(old?old.mix:0)),
    sumMaster:increment(vals.master-(old?old.master:0)),
    sumLyrics:increment(vals.lyrics-(old?old.lyrics:0)),
    sumBeat:increment(vals.beat-(old?old.beat:0)),
  };
  if(!old) upd.ratingCount=increment(1);
  await updateDoc(dref,upd);
  await setDoc(doc(db,"demos",id,"ratings",me.uid),{...vals,raterId:me.uid,updatedAt:serverTimestamp()});
  // profil sekmesindeysek kendi listemizi tazele
  if($("#tab-profile").classList.contains("active")) loadMyDemos();
}

/* ---- comments drawer ---- */
async function toggleComments(el,id){
  const dr=el.querySelector(".drawer");
  if(dr.classList.contains("open") && dr.dataset.kind==="cmt"){ dr.classList.remove("open"); return; }
  dr.dataset.kind="cmt"; dr.classList.add("open");
  dr.innerHTML=`<div class="center-load"><span class="spinner"></span></div>`;
  const qy=query(collection(db,"demos",id,"comments"),orderBy("createdAt","asc"));
  const snap=await getDocs(qy);
  let html=`<div class="eyebrow" style="margin-bottom:6px;">Geri bildirim</div><div class="comments">`;
  if(snap.empty) html+=`<div style="font-size:.74rem;color:var(--dim);padding:10px 0;font-family:'Space Mono';">İlk yorumu sen yaz.</div>`;
  snap.forEach(c=>{ const d=c.data();
    html+=`<div class="comment">
      <div class="c-av">${ d.authorPhoto?`<img src="${esc(d.authorPhoto)}">`:`<div class="ph">${esc(initial(d.authorName))}</div>`}</div>
      <div class="c-body"><div class="c-name">${esc(d.authorName)}<span>${timeAgo(d.createdAt)}</span></div>
      <div class="c-text">${esc(d.text)}</div></div></div>`; });
  html+=`</div>
    <div class="comment-form">
      <input class="input cmt-in" placeholder="Mix/söz/flow hakkında yaz..." maxlength="300">
      <button class="btn btn-sm btn-primary cmt-send" style="width:auto;">Gönder</button>
    </div>`;
  dr.innerHTML=html;
  const send=async ()=>{
    const inp=dr.querySelector(".cmt-in"); const txt=inp.value.trim(); if(!txt) return;
    inp.value="";
    await addDoc(collection(db,"demos",id,"comments"),{
      text:txt, authorId:me.uid, authorName:myProfile.displayName,
      authorPhoto:myProfile.photoURL||"", createdAt:serverTimestamp() });
    await updateDoc(doc(db,"demos",id),{commentCount:increment(1)});
    toggleComments(el,id); toggleComments(el,id); // yeniden çiz
    // sayaç güncellensin diye akış zaten onSnapshot ile tazelenecek
  };
  dr.querySelector(".cmt-send").onclick=send;
  dr.querySelector(".cmt-in").addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
}

/* ---- delete demo ---- */
async function deleteDemo(id,data){
  if(!confirm(`"${data.title}" silinsin mi? Bu işlem geri alınamaz.`)) return;
  try{
    if(data.storagePath){ try{ await deleteObject(ref(storage,data.storagePath)); }catch(_){} }
    await deleteDoc(doc(db,"demos",id));
    toast("Demo silindi");
    if($("#tab-profile").classList.contains("active")) loadMyDemos();
    if($("#tab-admin").classList.contains("active")) loadAdmin();
  }catch(e){ toast("Silinemedi: "+(e.code||e.message)); }
}

/* ================= ADMIN ================= */
async function loadAdmin(){
  const ubox=$("#admin-users"), dbox=$("#admin-demos");
  ubox.innerHTML=`<div class="center-load"><span class="spinner"></span></div>`;
  dbox.innerHTML="";
  // users
  const us=await getDocs(collection(db,"users"));
  ubox.innerHTML="";
  us.forEach(u=>{ const d=u.data(); const uid=u.id;
    const row=document.createElement("div"); row.className="admin-row";
    row.innerHTML=`
      <div class="demo-av" style="width:36px;height:36px;">${ d.photoURL?`<img src="${esc(d.photoURL)}">`:`<div class="ph">${esc(initial(d.displayName))}</div>`}</div>
      <div class="grow"><div class="t">${esc(d.displayName)} ${d.role==="admin"?'<span class="badge admin">ADMIN</span>':''}</div>
      <div class="s">${esc(d.email)}</div></div>`;
    if(uid!==me.uid){
      const btn=document.createElement("button"); btn.className="btn btn-sm "+(d.role==="admin"?"btn-danger":"btn-ghost");
      btn.style.width="auto"; btn.textContent=d.role==="admin"?"Adminliği al":"Admin yap";
      btn.onclick=async ()=>{ await updateDoc(doc(db,"users",uid),{role:d.role==="admin"?"user":"admin"}); loadAdmin(); };
      row.appendChild(btn);
    }
    ubox.appendChild(row);
  });
  // demos
  const ds=await getDocs(query(collection(db,"demos"),orderBy("createdAt","desc")));
  if(ds.empty){ dbox.innerHTML=emptyState("—","Demo yok."); return; }
  ds.forEach(x=>{ const d=x.data();
    const row=document.createElement("div"); row.className="admin-row";
    row.innerHTML=`<div class="grow"><div class="t">${esc(d.title)}</div>
      <div class="s">${esc(d.ownerName)} · ${esc(d.genre||"")} · ${d.ratingCount||0} oy</div></div>`;
    const del=document.createElement("button"); del.className="btn btn-sm btn-danger"; del.style.width="auto"; del.textContent="Sil";
    del.onclick=()=>deleteDemo(x.id,d); row.appendChild(del);
    dbox.appendChild(row);
  });
}
</script>
